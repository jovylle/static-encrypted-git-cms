# After encrypted content lands on master, ask the portfolio Netlify site to rebuild
# so it picks up fresh JSON from https://content.jovylle.com
#
# Required repo secret: PORTFOLIO_NETLIFY_BUILD_HOOK
#   Full URL, e.g. https://api.netlify.com/build_hooks/<id>
#   Netlify → portfolio site → Site configuration → Build & deploy → Build hooks

name: Trigger portfolio rebuild

on:
  push:
    branches: [master]
    paths:
      - 'data/encrypted/**'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify portfolio build
        env:
          HOOK_URL: ${{ secrets.PORTFOLIO_NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::Set PORTFOLIO_NETLIFY_BUILD_HOOK in repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -fsS -X POST -d '{}' "$HOOK_URL"
